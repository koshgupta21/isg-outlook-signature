<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Signature Test</title>
    <script src="src/designation.js"></script>
    <script src="src/signature.js"></script>
</head>
<body>
    <h2>Signature Preview</h2>
    <div id="preview" style="border:1px solid #ccc; padding:20px; margin:20px;"></div>

    <script>
        // Test different user scenarios
        const testUsers = [
            {
                displayName: "Kosh Gupta",
                jobTitle: "Senior Consultant",
                businessPhone: "+44 1234 567890",
                mobilePhone: "+44 7890 123456",
                comments: "Technology;26adv;United Kingdom"
            },
            {
                displayName: "Hans Mueller",
                jobTitle: "Director",
                businessPhone: "+49 69 1234 5678",
                mobilePhone: "+49 151 1234 5678",
                comments: "Technology;26cyb;Germany"   // ← German footer
            },
            {
                displayName: "Anna Weber",
                jobTitle: "Principal",
                businessPhone: "+41 44 1234 567",
                mobilePhone: "+41 79 1234 567",
                comments: "Technology;26fel;Switzerland"  // ← Swiss footer
            },
            {
                displayName: "Bob Wilson",
                jobTitle: "Manager",
                businessPhone: "+1 212 1234 5678",
                mobilePhone: "+1 917 1234 5678",
                comments: "cc;Technology;26adv;United States"  // ← CC + Advanced
            }
        ];

        // Show all test signatures
        testUsers.forEach(user => {
            const html = buildSignatureHtml(user);
            const div = document.createElement("div");
            div.style.borderBottom = "1px solid #eee";
            div.style.padding = "20px";
            div.innerHTML = `
                <p style="color:#999;font-size:12px;">
                    Comments: "${user.comments}"
                </p>
                ${html}
            `;
            document.getElementById("preview").appendChild(div);
        });
    </script>
</body>
</html>
